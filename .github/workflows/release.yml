name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, for example v1.2.3
        required: true
        type: string

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            arch: arm64
            runner: macos-15
          - target: darwin-x64
            arch: x64
            runner: macos-15-intel
          - target: win32-x64
            arch: x64
            runner: windows-2022
          - target: linux-x64
            arch: x64
            runner: ubuntu-22.04
          - target: linux-arm64
            arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            dbus-x11 \
            libgdk-pixbuf-2.0-dev \
            libglib2.0-dev \
            libxcb1-dev \
            libxcb-randr0-dev \
            openbox \
            x11-utils \
            xauth \
            xfonts-base \
            xterm \
            xvfb

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Build native addon
        run: pnpm exec cmake-js build --arch=${{ matrix.arch }}

      - name: Build package and run integration tests
        if: runner.os != 'Linux'
        run: pnpm check

      - name: Run Linux X11 integration tests
        if: runner.os == 'Linux'
        shell: bash
        run: |
          xvfb-run \
            --auto-servernum \
            --server-args='-screen 0 1280x1024x24' \
            bash <<'EOF'
          set -euo pipefail

          openbox >/tmp/nativekit-openbox.log 2>&1 &
          wm_pid=$!
          fixture_pid=''
          cleanup() {
            status=$?
            trap - EXIT
            if [ "$status" -ne 0 ]; then
              cat /tmp/nativekit-openbox.log || true
              cat /tmp/nativekit-xterm.log 2>/dev/null || true
              xprop -root _NET_SUPPORTING_WM_CHECK 2>/dev/null || true
              xprop -root _NET_CLIENT_LIST 2>/dev/null || true
            fi
            if [ -n "$fixture_pid" ]; then kill "$fixture_pid" 2>/dev/null || true; fi
            kill "$wm_pid" 2>/dev/null || true
            exit "$status"
          }
          trap cleanup EXIT

          wm_ready=false
          for attempt in $(seq 1 150); do
            if xprop -root _NET_SUPPORTING_WM_CHECK 2>/dev/null \
              | grep -Eq '^_NET_SUPPORTING_WM_CHECK\(WINDOW\): window id # 0x[0-9a-f]+'; then
              wm_ready=true
              break
            fi
            kill -0 "$wm_pid"
            sleep 0.1
          done
          test "$wm_ready" = true

          xterm -geometry 40x8+20+20 -title 'nativekit CI fixture' \
            -hold -e /bin/sh -c 'printf "nativekit CI fixture\n"' \
            >/tmp/nativekit-xterm.log 2>&1 &
          fixture_pid=$!
          fixture_ready=false
          for attempt in $(seq 1 150); do
            if xprop -root _NET_CLIENT_LIST 2>/dev/null \
              | grep -Eq '0x[0-9a-f]+'; then
              fixture_ready=true
              break
            fi
            kill -0 "$fixture_pid"
            sleep 0.1
          done
          test "$fixture_ready" = true

          pnpm check
          ELECTRON_ENABLE_LOGGING=1 \
            dbus-run-session -- \
            timeout 90s \
            pnpm exec electron examples/electron --smoke --disable-gpu
          EOF

      - name: Prepare N-API prebuild
        shell: bash
        run: |
          node_file=$(find build -name 'nativekit.node' -type f -print -quit)
          test -n "$node_file"
          if [ "${{ runner.os }}" = "macOS" ]; then
            minos=$(xcrun vtool -show-build "$node_file" | awk '$1 == "minos" { print $2; exit }')
            test "$minos" = "12.0"
          fi
          mkdir -p prebuilds/${{ matrix.target }}
          cp "$node_file" prebuilds/${{ matrix.target }}/nativekit.napi.node

      - name: Upload prebuild
        uses: actions/upload-artifact@v4
        with:
          name: prebuild-${{ matrix.target }}
          path: prebuilds/${{ matrix.target }}/nativekit.napi.node
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish npm package
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="$REQUESTED_TAG"
          else
            tag="$GITHUB_REF_NAME"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable npm trusted publishing
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Verify tagged package version
        shell: bash
        run: |
          package_version=$(node -p "require('./package.json').version")
          test "$package_version" = "${{ steps.release.outputs.version }}"

      - name: Download prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: prebuild-*
          path: artifacts

      - name: Assemble package
        shell: bash
        run: |
          for target in darwin-arm64 darwin-x64 win32-x64 linux-x64 linux-arm64; do
            source="artifacts/prebuild-${target}/nativekit.napi.node"
            test -f "$source"
            mkdir -p "prebuilds/${target}"
            cp "$source" "prebuilds/${target}/nativekit.napi.node"
          done
          pnpm build:js

      - name: Pack and inspect tarball
        id: package
        shell: bash
        run: |
          archive=$(npm pack --ignore-scripts --silent)
          test -n "$archive"
          contents=$(tar -tf "$archive")
          for target in darwin-arm64 darwin-x64 win32-x64 linux-x64 linux-arm64; do
            grep -Fqx "package/prebuilds/${target}/nativekit.napi.node" <<< "$contents"
          done
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Publish package
        run: npm publish "${{ steps.package.outputs.archive }}" --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.archive }}
